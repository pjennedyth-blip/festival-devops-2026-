services:

  frontend:
    build: ./frontend
    container_name: festival_frontend
    ports:
      - "8080:80"
    depends_on:
      - backend

  backend:
    build: ./backend
    container_name: festival_backend
    ports:
      - "5000:5000"
    depends_on:
      - mysql

  mysql:
    image: mysql:8.0
    container_name: festival_mysql

    environment:
      MYSQL_ROOT_PASSWORD: root123
      MYSQL_DATABASE: festivaldb

    ports:
      - "3306:3306"

    volumes:
      - mysql_data:/var/lib/mysql

volumes:
  mysql_data:
